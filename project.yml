name: VocabSpark
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2" # iPad only
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

targets:
  VocabSpark:
    type: application
    platform: iOS
    sources:
      - path: Sources/FrenchVocab
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/FrenchVocab/Info.plist
      properties:
        CFBundleDisplayName: "VocabSpark"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Nicht benötigt"
        OPENAI_API_KEY: "$(OPENAI_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michikoenig.vocabspark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    scheme:
      testTargets: []
