name: VocabSpark
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_LANGUAGE: de
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"

targets:
  VocabSpark:
    type: application
    platform: iOS
    sources:
      - path: Sources/FrenchVocab
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    info:
      path: Sources/FrenchVocab/Info.plist
      properties:
        CFBundleDisplayName: "VocabSpark"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        OPENAI_API_KEY: "$(OPENAI_API_KEY)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michikoenig.vocabspark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
    scheme:
      testTargets:
        - VocabSparkTests

  VocabSparkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VocabSparkTests
    dependencies:
      - target: VocabSpark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michikoenig.vocabspark.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VocabSpark.app/VocabSpark"
        BUNDLE_LOADER: "$(TEST_HOST)"
